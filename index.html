<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 长宁链家房价追踪器</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 30px 20px; border-radius: 16px; margin-bottom: 24px; text-align: center; }
    header h1 { font-size: 28px; margin-bottom: 8px; }
    header p { opacity: 0.9; font-size: 14px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-card .num { font-size: 32px; font-weight: 700; color: #1a73e8; }
    .stat-card .label { color: #666; font-size: 13px; margin-top: 4px; }
    .filters { background: white; padding: 16px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .filters select, .filters input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .filters label { font-size: 13px; color: #666; }
    .listings { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .listing-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .listing-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .listing-image { height: 160px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; }
    .listing-body { padding: 16px; }
    .listing-name { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 8px; text-decoration: none; }
    .listing-name:hover { color: #1a73e8; text-decoration: underline; }
    .listing-info { font-size: 13px; color: #666; margin-bottom: 6px; }
    .listing-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .tag { padding: 4px 8px; background: #e8f0fe; color: #1a73e8; border-radius: 4px; font-size: 11px; }
    .price-tag { background: #fce8e6; color: #c5221f; padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 18px; display: inline-block; margin-top: 10px; }
    .price-tag .unit { font-size: 12px; font-weight: 400; color: #666; }
    .empty { text-align: center; padding: 60px 20px; color: #999; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .loading { text-align: center; padding: 60px 20px; color: #666; }
    .refresh-btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .refresh-btn:hover { background: #1557b0; }
    .refresh-btn:disabled { background: #ccc; cursor: not-allowed; }
    .last-update { font-size: 12px; color: #999; margin-top: 8px; }
    footer { text-align: center; padding: 40px 20px; color: #999; font-size: 12px; }
    .price-range { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-top: 6px; display: inline-block; }
    .history-btn { background: #ff9800; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 8px; }
    .history-btn:hover { background: #f57c00; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #333; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .modal-close:hover { color: #333; }
    .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: #666; font-size: 13px; }
    .history-price { font-weight: 700; font-size: 16px; color: #1a73e8; }
    .history-change { font-size: 11px; margin-left: 8px; }
    .history-change.up { color: #c5221f; }
    .history-change.down { color: #34a853; }
    .price-chart { margin: 16px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    
    const SUPABASE_URL = 'https://zojmkzwhyoxowssxkoko.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpvam1rendoeW94b3dzc3hrb2tvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzY4ODIsImV4cCI6MjA5MDMxMjg4Mn0.1vrlQlyL6kQ63Rc3G_otmTwIcqpGrQnZaFFMMou7bcE';
    
    function App() {
      const [listings, setListings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [filterArea, setFilterArea] = useState('all');
      const [customMaxPrice, setCustomMaxPrice] = useState('');
      const [syncStatus, setSyncStatus] = useState('');
      const [uniqueNames, setUniqueNames] = useState([]);
      const [stats, setStats] = useState({ total: 0, minPrice: 0, avgPrice: 0, snapshots: 0 });
      const [priceHistory, setPriceHistory] = useState(null); // For modal
      
      const fetchListings = useCallback(async () => {
        setLoading(true);
        try {
          // Fetch all snapshots to calculate price history
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/listings?select=*&order=created_at.desc`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
              }
            }
          );
          
          if (!response.ok) throw new Error('Failed to fetch');
          const data = await response.json();
          
          // Group by listing_id and calculate price stats
          const byListingId = {};
          data.forEach(item => {
            if (!byListingId[item.listing_id]) {
              byListingId[item.listing_id] = [];
            }
            byListingId[item.listing_id].push(item);
          });
          
          // Calculate min/max/current for each listing
          const priceStats = {};
          Object.keys(byListingId).forEach(id => {
            const records = byListingId[id];
            const prices = records.map(r => parseFloat(r.price)).filter(p => !isNaN(p));
            const sortedByDate = [...records].sort((a, b) => new Date(b.scraped_at) - new Date(a.scraped_at));
            priceStats[id] = {
              min: prices.length > 0 ? Math.min(...prices) : 0,
              max: prices.length > 0 ? Math.max(...prices) : 0,
              count: records.length,
              history: sortedByDate.map(r => ({
                price: r.price,
                scraped_at: r.scraped_at
              }))
            };
          });
          
          // Get unique names and their latest entries, with price stats
          const latestByName = {};
          data.forEach(item => {
            const key = item.name + '_' + item.area;
            if (!latestByName[key] || new Date(item.created_at) > new Date(latestByName[key].created_at)) {
              latestByName[key] = item;
            }
          });
          
          // Attach price stats to each listing
          const latestListings = Object.values(latestByName).map(item => ({
            ...item,
            priceStats: priceStats[item.listing_id] || { min: item.price, max: item.price, count: 1, history: [{ price: item.price, scraped_at: item.scraped_at }] }
          }));
          
          // Get unique names for filter
          const names = [...new Set(latestListings.map(l => l.name))].sort();
          
          // Calculate stats
          const prices = latestListings.map(l => parseFloat(l.price)).filter(p => !isNaN(p));
          const minPrice = prices.length > 0 ? Math.min(...prices) : 0;
          const avgPrice = prices.length > 0 ? Math.round(prices.reduce((a, b) => a + b, 0) / prices.length) : 0;
          
          setStats({
            total: latestListings.length,
            minPrice,
            avgPrice,
            snapshots: data.length,
            lastScrape: latestListings.length > 0 ? Math.max(...latestListings.map(l => new Date(l.scraped_at || l.created_at))) : null
          });
          
          setListings(latestListings);
          setUniqueNames(names);
          setLastUpdate(new Date().toLocaleString('en-GB', { timeZone: 'Europe/London', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }));
        } catch (error) {
          console.error('Error fetching:', error);
        } finally {
          setLoading(false);
        }
      }, []);
      
      useEffect(() => {
        fetchListings();
        // Load saved max_price from config
        fetch(`${SUPABASE_URL}/rest/v1/config?key=eq.max_price`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        }).then(r => r.json()).then(data => {
          if (data && data[0] && data[0].value && data[0].value !== '0') {
            setCustomMaxPrice(data[0].value);
          }
        }).catch(() => {});
        
        const interval = setInterval(fetchListings, 60000); // Auto-refresh every minute
        return () => clearInterval(interval);
      }, [fetchListings]);
      
      const filteredListings = listings.filter(l => {
        const price = parseFloat(l.price);
        if (customMaxPrice && price > parseFloat(customMaxPrice)) return false;
        
        const area = parseFloat(l.area);
        if (filterArea === 'under35' && area >= 35) return false;
        if (filterArea === '35-50' && (area < 35 || area >= 50)) return false;
        if (filterArea === '50plus' && area < 50) return false;
        
        return true;
      });
      
      const syncConfig = async () => {
        const price = customMaxPrice || '0';
        setSyncStatus('同步中...');
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/config?key=eq.max_price`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'resolution=merge-duplicates'
            },
            body: JSON.stringify([{ key: 'max_price', value: price }])
          });
          if (res.ok) {
            setSyncStatus('已同步✓');
            setTimeout(() => setSyncStatus(''), 2000);
          } else {
            setSyncStatus('同步失败');
          }
        } catch {
          setSyncStatus('同步失败');
        }
      };
      
      const formatArea = (area) => area ? `${area}㎡` : '-';
      
      return (
        <div className="container">
          <header>
            <h1>🏠 长宁链家房价追踪器</h1>
            <p>实时监控上海长宁区二手房价格变化</p>
          </header>
          
          <div className="stats">
            <div className="stat-card">
              <div className="num">{stats.total}</div>
              <div className="label">在售房源</div>
            </div>
            <div className="stat-card">
              <div className="num">{stats.minPrice}</div>
              <div className="label">最低总价(万)</div>
            </div>
            <div className="stat-card">
              <div className="num">{stats.avgPrice}</div>
              <div className="label">平均总价(万)</div>
            </div>
            <div className="stat-card">
              <div className="num">{stats.snapshots}</div>
              <div className="label">累计快照数</div>
            </div>
            <div className="stat-card">
              <div className="num" style={{fontSize: '20px'}}>{stats.lastScrape ? new Date(stats.lastScrape).toLocaleString('en-GB', {timeZone:'Europe/London', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '-'}</div>
              <div className="label">最后更新</div>
            </div>
          </div>
          
          <div className="filters">
            <label>最高总价(万):</label>
            <input 
              type="number" 
              placeholder="不限" 
              value={customMaxPrice} 
              onChange={e => setCustomMaxPrice(e.target.value)}
              style={{width: '80px'}}
            />
            
            <button className="refresh-btn" onClick={syncConfig} style={{background: '#34a853', fontSize: '12px', padding: '6px 12px'}}>
              {syncStatus || '💾 同步条件到自动抓取'}
            </button>
            
            <label>面积筛选:</label>
            <select value={filterArea} onChange={e => setFilterArea(e.target.value)}>
              <option value="all">全部</option>
              <option value="under35">35㎡以下</option>
              <option value="35-50">35-50㎡</option>
              <option value="50plus">50㎡以上</option>
            </select>
            
            <button className="refresh-btn" onClick={fetchListings} disabled={loading}>
              {loading ? '加载中...' : '🔄 刷新'}
            </button>
            
            {lastUpdate && <div className="last-update">最后更新: {lastUpdate}</div>}
          </div>
          
          {loading && listings.length === 0 ? (
            <div className="loading">
              <div>🔄 加载中...</div>
            </div>
          ) : filteredListings.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">🏠</div>
              <div>暂无符合条件的房源</div>
            </div>
          ) : (
            <div className="listings">
              {filteredListings.map((listing, idx) => (
                <div key={idx} className="listing-card">
                  <div className="listing-image">
                    {listing.name ? listing.name.charAt(0) : '🏠'}
                  </div>
                  <div className="listing-body">
                    <a href={listing.url} target="_blank" rel="noopener noreferrer" className="listing-name">
                      {listing.name || '未知小区'}
                    </a>
                    <div className="listing-info">📐 面积: {formatArea(listing.area)}</div>
                    <div className="listing-info">📍 板块: {listing.district || '-'}</div>
                    <div className="listing-info">🏢 楼层: {listing.floor || '-'} | {listing.year_build || '-'}年</div>
                    <div className="listing-info">💰 单价: {listing.unit_price || '-'}元/㎡</div>
                    <div className="listing-tags">
                      {(listing.tags || '').split(',').filter(t => t).map((tag, i) => (
                        <span key={i} className="tag">{tag.trim()}</span>
                      ))}
                    </div>
                    <div className="price-tag">
                      {listing.price}万<span className="unit"> ({listing.unit_price}元/㎡)</span>
                    </div>
                    {listing.priceStats && listing.priceStats.count > 1 && (
                      <div style={{marginTop: '6px'}}>
                        <span className="price-range">
                          📊 {listing.priceStats.min}万 - {listing.priceStats.max}万
                        </span>
                        <button className="history-btn" onClick={() => setPriceHistory({
                          name: listing.name,
                          listing_id: listing.listing_id,
                          ...listing.priceStats
                        })}>
                          📈 历史({listing.priceStats.count})
                        </button>
                      </div>
                    )}
                    {listing.scraped_at && (
                      <div className="listing-info" style={{marginTop: '8px', color: '#888', fontSize: '11px'}}>
                        🕐 {new Date(listing.scraped_at).toLocaleString('en-GB', {timeZone:'Europe/London', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
          
          {/* Price History Modal */}
          {priceHistory && (
            <div className="modal-overlay" onClick={() => setPriceHistory(null)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <div className="modal-title">📈 价格历史</div>
                  <button className="modal-close" onClick={() => setPriceHistory(null)}>&times;</button>
                </div>
                <div style={{marginBottom: '16px', color: '#666', fontSize: '14px'}}>
                  {priceHistory.name || '未知小区'} ({priceHistory.listing_id})
                </div>
                
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:'20px', background:'#f5f5f5', padding:'12px', borderRadius:'8px'}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:'11px', color:'#666'}}>最低价</div>
                    <div style={{fontSize:'20px', fontWeight:'700', color:'#34a853'}}>{priceHistory.min}万</div>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:'11px', color:'#666'}}>当前价</div>
                    <div style={{fontSize:'20px', fontWeight:'700', color:'#1a73e8'}}>{priceHistory.history[0]?.price}万</div>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:'11px', color:'#666'}}>最高价</div>
                    <div style={{fontSize:'20px', fontWeight:'700', color:'#c5221f'}}>{priceHistory.max}万</div>
                  </div>
                </div>
                
                <div className="price-chart">
                  <div style={{fontSize:'13px', color:'#666', marginBottom:'10px'}}>价格变化时间线：</div>
                  <svg width="100%" height="160" style={{display:'block'}}>
                    {(() => {
                      const history = priceHistory.history.slice().reverse();
                      const prices = history.map(h => parseFloat(h.price));
                      const minP = Math.min(...prices);
                      const maxP = Math.max(...prices);
                      const range = maxP - minP || 1;
                      const barWidth = Math.min(40, (100 / history.length) - 2);
                      const chartHeight = 120;
                      
                      return history.map((h, i) => {
                        const barHeight = ((parseFloat(h.price) - minP) / range) * chartHeight + 10;
                        const x = 10 + i * (barWidth + 2);
                        const y = chartHeight - barHeight + 10;
                        const color = i === history.length - 1 ? '#1a73e8' : '#93c5fd';
                        
                        return (
                          <g key={i}>
                            <rect x={x} y={y} width={barWidth} height={barHeight} fill={color} rx="4"
                              onMouseOver={e => e.target.setAttribute('opacity', '0.7')}
                              onMouseOut={e => e.target.setAttribute('opacity', '1')}
                            />
                            <text x={x + barWidth/2} y={chartHeight + 24} textAnchor="middle" fontSize="9" fill="#999">
                              {new Date(h.scraped_at).toLocaleString('en-GB', {timeZone:'Europe/London', month:'numeric', day:'numeric'}).split('/').join('.')}
                            </text>
                            <text x={x + barWidth/2} y={y - 4} textAnchor="middle" fontSize="10" fontWeight="600" fill="#333">
                              {h.price}万
                            </text>
                          </g>
                        );
                      });
                    })()}
                  </svg>
                  <div style={{display:'flex', justifyContent:'space-between', marginTop:'8px', padding:'0 10px'}}>
                    <span style={{fontSize:'11px', color:'#34a853'}}>最低: {priceHistory.min}万</span>
                    <span style={{fontSize:'11px', color:'#c5221f'}}>最高: {priceHistory.max}万</span>
                  </div>
                </div>
              </div>
            </div>
          )}
          
          <footer>
            <p>数据来源: 链家网 · 由 OpenClaw 自动追踪</p>
            <p>每5分钟自动更新 · 请勿视为投资建议，购房前请自行核实信息</p>
          </footer>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
